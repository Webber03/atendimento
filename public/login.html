<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LF — Acesso ao Sistema</title>
  <meta name="description" content="Faça login para acessar o painel de atendimento e geração de leads LF.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/logo_lf2.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-dark: #0b0f1a;
      --bg-card: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.1);
      --accent: #6c63ff;
      --accent-light: #8b85ff;
      --accent-glow: rgba(108, 99, 255, 0.3);
      --text: #f0f4ff;
      --text-muted: rgba(240, 244, 255, 0.5);
      --error: #ff5c7a;
      --success: #4ade80;
      --input-bg: rgba(255,255,255,0.06);
    }

    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      overflow: hidden;
    }

    /* Animated gradient background */
    .bg-animated {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(108,99,255,0.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(99,199,255,0.1) 0%, transparent 50%),
                  radial-gradient(ellipse at 60% 80%, rgba(255,99,180,0.08) 0%, transparent 50%),
                  #0b0f1a;
      animation: bgShift 12s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes bgShift {
      0% { background-position: 0% 0%; }
      100% { background-position: 100% 100%; }
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      animation: float 8s ease-in-out infinite;
      z-index: 0;
    }
    .orb-1 { width: 400px; height: 400px; background: #6c63ff; top: -100px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 300px; height: 300px; background: #63b3ff; bottom: -80px; right: -80px; animation-delay: 3s; }
    .orb-3 { width: 200px; height: 200px; background: #ff63b3; top: 60%; left: 60%; animation-delay: 6s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -30px) scale(1.05); }
    }

    /* Main layout */
    .login-page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Card */
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05) inset;
      animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Logo area */
    .login-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .login-logo img {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .login-logo-text h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-logo-text p {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
      margin-top: 2px;
    }

    /* Welcome text */
    .login-welcome {
      margin-bottom: 32px;
    }

    .login-welcome h2 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .login-welcome p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* Form */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-field label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.3px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .form-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px 14px 44px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .form-input::placeholder {
      color: rgba(240,244,255,0.2);
    }

    .form-input:focus {
      border-color: var(--accent);
      background: rgba(108, 99, 255, 0.08);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* Password toggle */
    .btn-eye {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .btn-eye:hover { color: var(--text); }

    /* Error message */
    .error-alert {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 92, 122, 0.12);
      border: 1px solid rgba(255, 92, 122, 0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--error);
      animation: shake 0.4s ease;
      display: none;
    }

    .error-alert.visible { display: flex; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    /* Submit button */
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--accent) 0%, #8b45ff 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 8px 24px var(--accent-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }

    .btn-login:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(108, 99, 255, 0.5);
    }

    .btn-login:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Footer */
    .login-footer {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card { padding: 36px 24px; }
    }
  </style>
</head>
<body>

  <div class="bg-animated"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-page">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <img src="assets/logo_lf.jpg" alt="LF Logo">
        <div class="login-logo-text">
          <h1>LF Sistema</h1>
          <p>Painel de Atendimento e Leads</p>
        </div>
      </div>

      <!-- Welcome -->
      <div class="login-welcome">
        <h2>Bem-vindo de volta 👋</h2>
        <p>Insira suas credenciais para acessar o painel.</p>
      </div>

      <!-- Error Alert -->
      <div class="error-alert" id="error-alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="error-message">Usuário ou senha inválidos.</span>
      </div>

      <!-- Form -->
      <form class="login-form" id="login-form" novalidate>
        <div class="form-field">
          <label for="username">Usuário</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="username" class="form-input" placeholder="seu.usuario" autocomplete="username" required>
          </div>
        </div>

        <div class="form-field">
          <label for="password">Senha</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="btn-eye" id="btn-toggle-password" aria-label="Mostrar senha">
              <svg id="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btn-login">
          <div class="spinner"></div>
          <span class="btn-text">Entrar no Sistema</span>
        </button>
      </form>

      <div class="login-footer">
        <p>Desenvolvido por ConnectMax &mdash; &copy; 2026</p>
      </div>

    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Redirecionar se já está autenticado
    if (isAuthenticated()) {
      window.location.href = '/';
    }

    const form = document.getElementById('login-form');
    const btnLogin = document.getElementById('btn-login');
    const errorAlert = document.getElementById('error-alert');
    const errorMessage = document.getElementById('error-message');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const btnToggle = document.getElementById('btn-toggle-password');
    const eyeOpen = document.getElementById('eye-open');
    const eyeClosed = document.getElementById('eye-closed');

    // Toggle password visibility
    btnToggle.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeOpen.style.display = isPassword ? 'none' : 'block';
      eyeClosed.style.display = isPassword ? 'block' : 'none';
    });

    function showError(msg) {
      errorMessage.textContent = msg;
      errorAlert.style.display = 'flex';
      errorAlert.classList.add('visible');
    }

    function hideError() {
      errorAlert.classList.remove('visible');
      errorAlert.style.display = 'none';
    }

    function setLoading(loading) {
      btnLogin.disabled = loading;
      btnLogin.classList.toggle('loading', loading);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!username || !password) {
        showError('Preencha todos os campos.');
        return;
      }

      setLoading(true);
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Erro ao fazer login.');
          return;
        }

        saveAuth(data.token, data.user);
        window.location.href = '/';
      } catch (err) {
        showError('Erro de conexão. Tente novamente.');
      } finally {
        setLoading(false);
      }
    });

    // Focus no primeiro campo
    usernameInput.focus();
  </script>
</body>
</html>
